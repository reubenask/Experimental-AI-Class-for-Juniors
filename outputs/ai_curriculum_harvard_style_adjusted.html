<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Curriculum - Adjusted Teaching Portal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --crimson:#a72b35;
  --crimson-dark:#7f1d27;
  --crimson-soft:#fff1f2;
  --ink:#202124;
  --muted:#5f6368;
  --line:#e5e7eb;
  --soft:#f7f7f8;
  --panel:#ffffff;
  --green:#1f6f5b;
  --gold:#8a5b12;
  --blue:#345995;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:#fff;line-height:1.45}
button{font:inherit}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.home-screen{min-height:100vh;display:grid;place-items:center;background:#fff;padding:28px;position:relative}
.home-entry{display:grid;place-items:center}
.home-brand{transform:translateY(-2vh)}
.home-actions{position:absolute;top:42px;right:52px;display:flex;align-items:center;gap:8px}
.home-guide,.lang-link{display:flex;align-items:center;gap:0;border:0;background:#fff;color:#2d2d2f;font-weight:700;font-size:12px;cursor:pointer;padding:8px 10px;border-radius:8px;text-decoration:none}
.home-guide:hover,.lang-link:hover{background:#f7f7f8}
.lang-link{border:1px solid var(--line);min-width:36px;justify-content:center}
.lang-link.active{background:var(--crimson);border-color:var(--crimson);color:#fff}
.home-guide i{display:none}
.guide-shell[hidden]{display:none}
.shell{min-height:100vh;background:linear-gradient(#fff,#fff 220px,#fafafa)}
.topbar{height:86px;display:flex;align-items:center;justify-content:space-between;padding:0 44px}
.brand{display:flex;align-items:center;gap:14px;font-weight:800;letter-spacing:.08em;font-size:24px}
.shield{width:58px;height:68px;background:var(--crimson);color:#fff;display:grid;place-items:center;font-weight:900;border-radius:7px 7px 24px 24px;font-size:24px;letter-spacing:-.06em}
.help{display:flex;align-items:center;gap:9px;font-weight:650;font-size:18px;color:#2d2d2f}
.wrap{max-width:980px;margin:64px auto 80px;padding:0 24px}
.hero h1{font-size:34px;line-height:1.15;margin:0 0 28px;font-weight:760}
.notice{border:3px solid var(--crimson);background:var(--crimson-soft);border-radius:16px;padding:30px 36px;margin-bottom:32px}
.notice-kicker{display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.11em;font-size:10px;font-weight:800;color:var(--crimson)}
.notice-dot{width:8px;height:8px;border-radius:50%;background:var(--crimson)}
.notice h2{font-size:10px;margin:12px 0 8px}
.notice p{font-size:10px;margin:0;color:#333;max-width:760px}
.notice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:26px}
.metric{background:#fff;border:1px solid #ead1d4;border-radius:10px;padding:14px 16px}
.metric b{display:block;font-size:10px;color:var(--crimson-dark)}
.metric span{font-size:10px;color:var(--muted)}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 20px}
.nav-btn{border:1px solid var(--line);background:#fff;color:#333;border-radius:999px;padding:10px 16px;cursor:pointer;font-weight:650}
.nav-btn.active{background:var(--crimson);border-color:var(--crimson);color:#fff}
.module{border:1px solid var(--line);border-radius:13px;background:#fff;margin:18px 0;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.module-head{width:100%;border:0;background:#fff;display:flex;align-items:center;gap:22px;padding:24px 28px;cursor:pointer;text-align:left}
.module-head:hover{background:#fbfbfb}
.icon-circle{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:#f4f4f5;flex:0 0 auto;color:#1f2328;font-size:27px}
.module-title{flex:1;min-width:0}
.module-title small{display:block;text-transform:uppercase;letter-spacing:.09em;color:var(--crimson);font-weight:800;font-size:12px;margin-bottom:5px}
.module-title strong{display:block;font-size:21px;line-height:1.25}
.module-title span{display:block;color:var(--muted);font-size:14px;margin-top:5px}
.module-illustration{width:184px;height:104px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;flex:0 0 auto;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.module-illustration svg{display:block;width:100%;height:100%}
.chev{font-size:29px;color:#9aa0a6}
.module-body{border-top:1px solid var(--line);background:#fff}
.module-body[hidden]{display:none}
.module.open > .module-head > .chev{transform:rotate(90deg)}
.subsection{border-bottom:1px solid var(--line)}
.subsection:last-child{border-bottom:0}
.sub-head{width:100%;border:0;background:#fff;display:flex;align-items:center;gap:15px;padding:19px 28px;cursor:pointer;text-align:left}
.sub-head:hover{background:#fafafa}
.sub-num{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:var(--crimson-soft);color:var(--crimson);font-weight:800;flex:0 0 auto}
.sub-head strong{font-size:17px}
.sub-head span{display:block;color:var(--muted);font-size:13px;margin-top:3px}
.sub-body{padding:0 28px 28px;background:#fff}
.sub-body[hidden]{display:none}
.subsection.open > .sub-head > .chev{transform:rotate(90deg)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:18px}
.panel{border:1px solid var(--line);border-radius:10px;background:#fff;padding:18px}
.panel.full{grid-column:1/-1}
.label{display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.08em;font-size:12px;font-weight:800;color:#666;margin-bottom:12px}
.label i{font-size:18px;color:var(--crimson)}
.list{display:grid;gap:9px;margin:0;padding:0;list-style:none}
.list li{padding-left:18px;position:relative;color:#333}
.list li:before{content:"";position:absolute;left:0;top:.65em;width:6px;height:6px;border-radius:50%;background:var(--crimson)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--line);background:#fafafa;border-radius:999px;padding:7px 11px;font-size:13px;color:#333}
.session-list{display:grid;gap:12px}
.session-card{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;display:grid;grid-template-columns:220px 1fr}
.session-visual{min-height:190px;background:#fff;border-right:1px solid var(--line);overflow:hidden}
.session-art{display:block;width:100%;height:100%;min-height:190px}
.session-content{min-width:0}
.session-top{display:flex;gap:14px;padding:16px;background:#fafafa}
.session-code{font-weight:850;color:var(--crimson);min-width:42px}
.session-copy strong{display:block;font-size:16px;margin-bottom:4px}
.session-copy p{margin:0;color:#4b5563;font-size:14px}
.image-brief{border-top:1px solid var(--line);padding:15px 16px;background:#fff}
.image-brief b{display:flex;align-items:center;gap:7px;color:#333;margin-bottom:4px}
.image-brief b:before{content:"";width:9px;height:9px;border-radius:50%;background:var(--crimson)}
.image-brief p{margin:0;color:#555;font-size:14px}
.homework{border:2px solid var(--crimson);background:var(--crimson-soft);border-radius:13px;padding:22px}
.homework h3{margin:0 0 7px;font-size:20px}
.homework .mission{font-size:16px;color:#333;margin:0 0 16px}
.req{border-left:3px solid var(--crimson);padding:9px 0 9px 14px;margin:8px 0;background:rgba(255,255,255,.55)}
.choice{background:#fff;border:1px solid #efd2d5;border-radius:10px;padding:15px;margin:10px 0}
.choice small{display:block;text-transform:uppercase;letter-spacing:.08em;color:var(--crimson);font-weight:800;margin-bottom:5px}
.choice strong{display:block;margin-bottom:5px}
.deliver{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.deliver span{background:#fff;border:1px solid #efd2d5;color:var(--crimson-dark);border-radius:999px;padding:6px 10px;font-size:13px;font-weight:650}
.divider{display:flex;align-items:center;gap:20px;margin:34px 0;color:#333;font-weight:700}
.divider:before,.divider:after{content:"";height:1px;background:var(--line);flex:1}
.rubric table{width:100%;border-collapse:collapse;font-size:14px}
.rubric th,.rubric td{border:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}
.rubric th{background:#fafafa}
.image-library{margin:0 0 22px}
.image-library .session-list{grid-template-columns:1fr}
.library-note{color:var(--muted);margin:0 0 16px;font-size:15px}
@media(max-width:760px){
  .home-actions{top:18px;right:18px}.home-guide,.lang-link{font-size:12px;padding:8px 10px}.home-brand{transform:none}.home-brand.brand{font-size:22px}.home-brand .shield{width:54px;height:64px;font-size:22px}
  .topbar{padding:0 20px;height:76px}.brand{font-size:18px}.shield{width:44px;height:52px;font-size:18px}.help{font-size:14px}
  .wrap{margin:32px auto 56px;padding:0 16px}.hero h1{font-size:28px}
  .notice{padding:22px}.notice-grid{grid-template-columns:1fr}
  .module-head{padding:20px;align-items:flex-start}.module-illustration{display:none}.grid{grid-template-columns:1fr}.panel.full{grid-column:auto}
  .session-card{grid-template-columns:1fr}.session-visual{min-height:170px;border-right:0;border-bottom:1px solid var(--line)}
}

/* Unified typography: match the clean CURRICULUM wordmark style across English and Chinese. */
:root{--ui-font:Inter,"Noto Sans SC","Microsoft YaHei","PingFang SC","Hiragino Sans GB",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
body,button,input,select,textarea,.serif,.simple-title,.hero h1,.module-title strong,.m-meta h3,.legend-card h4,.section-head h2,.rubric-card .rc-head h3,.portal-card h2{font-family:var(--ui-font)}
body{letter-spacing:0}
.hero h1,.simple-title,.m-meta h3,.section-head h2,.rubric-card .rc-head h3{letter-spacing:0}
.hero h1 em{font-style:normal}
.wordmark,.brand,.wordmark-title,.footer-wordmark-title{font-family:var(--ui-font)}

/* Responsive deployment polish for phone and iPad. */
html{overflow-x:hidden}
body{overflow-x:hidden}
img,svg,canvas,video{max-width:100%;height:auto}
(max-width:900px){
  .header-inner,.topbar{padding-left:18px;padding-right:18px}
  .wordmark-title{font-size:18px;letter-spacing:.08em}
  .page-nav,.controls,.filters{gap:8px}
  .page-nav a,.chip-btn,.ghost-link{font-size:12px;padding:8px 11px}
  .simple-main,.main,.rubric-page,.phases-page,.hero,.portal-menu{padding-left:18px;padding-right:18px}
}
(max-width:640px){
  .wordmark{gap:10px}.crest{width:34px;height:40px;font-size:16px}.wordmark-title{font-size:16px;letter-spacing:.06em}
  .home-screen{padding:18px}.home-actions{left:18px;right:18px;justify-content:flex-end;gap:6px}.home-guide,.lang-link{font-size:11px;padding:7px 8px}.home-brand.brand{font-size:20px;gap:10px}.home-brand .shield{width:48px;height:58px;font-size:20px}
  .portal-hub,.phase-dashboard,.rubric-fit,.rubric-zh{overflow:auto}
  .portal-hub .hero,.zh-hub .hero,.en-hub .hero{padding:22px 18px 14px}
  .portal-hub .hero h1,.zh-hub .hero h1,.en-hub .hero h1{font-size:30px;line-height:1.1;max-width:100%}
  .portal-hub .hero-lead,.zh-hub .hero-lead,.en-hub .hero-lead{font-size:13px;line-height:1.48}
  .portal-hub .portal-menu,.zh-hub .portal-menu,.en-hub .portal-menu{grid-template-columns:1fr;gap:12px;margin-top:10px}
  .portal-hub .portal-card,.zh-hub .portal-card,.en-hub .portal-card{min-height:132px;padding:16px}
  .phase-dashboard .phases-page{padding:18px}.phase-dashboard .phase-legend{grid-template-columns:1fr}.phase-dashboard .legend-card{min-height:150px}.phase-dashboard .legend-card p{max-width:90%}
  .rubric-fit .rubric-page,.rubric-zh .rubric-page{padding:18px;min-height:auto}.rubric-fit .rubric-scroll,.rubric-zh .rubric-scroll{overflow-x:auto}.rubric-fit .rubric table,.rubric-zh .rubric table{min-width:760px}
  .simple-title{font-size:34px}.simple-lead{font-size:15px}
  .controls{align-items:stretch}.search{min-width:100%;flex-basis:100%}.expand-toggle{margin-left:0}
  .module-head{display:grid;grid-template-columns:auto 1fr auto;gap:12px;padding:16px}.m-tile{width:54px;height:54px}.m-meta h3{font-size:18px}.m-sub{font-size:12px;gap:8px}
  .session-grid,.grid{grid-template-columns:1fr}.homework{padding:16px}.homework h3{max-width:100%;font-size:18px}
}
</style>
</head>
<body>
<section class="home-screen" id="homeScreen">
  <div class="home-actions" aria-label="Teaching guide language choices">
    <a class="home-guide" href="ai_curriculum_teaching_portal.html"><span>Teaching Guide</span></a>
    <a class="lang-link active" href="ai_curriculum_teaching_portal.html" lang="en">En</a>
    <a class="lang-link" href="ai_curriculum_teaching_portal_zh.html" lang="zh-Hans">中</a>
  </div>
  <div class="home-entry">
    <div class="brand home-brand"><div class="shield">AI</div><div>CURRICULUM</div></div>
  </div>
</section>

</body>
</html>
